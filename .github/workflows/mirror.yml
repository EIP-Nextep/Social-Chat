name: Push to School Sub-folder

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]
    types: ["closed"]

jobs:
  push-to-folder:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Nettoyer le .git (Anti-Submodule)
        run: rm -rf .git

      - name: Push vers le sous-dossier de l'école
        uses: cpina/github-action-push-to-another-repository@main
        env:
          SSH_DEPLOY_KEY: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
        with:
          source-directory: '.' 
          destination-github-username: 'EpitechPGE3-2025' 
          destination-repository-name: 'G-EIP-600-PAR-6-1-eip-5' 
          user-email: ${{ github.actor }}@users.noreply.github.com
          
          target-directory: 'test_workflows' 
          
          target-branch: 'main'